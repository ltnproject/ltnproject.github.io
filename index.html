<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>drk.link — URL Shortener</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9926451246356367" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff47;
      --accent-dim: #b8cc2a;
      --text: #f0f0f0;
      --muted: #555;
      --error: #ff4d4d;
      --success: #47ffb2;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .logo span { color: var(--accent); }

    .tagline {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 2rem;
      width: 3rem; height: 2px;
      background: var(--accent);
    }

    /* Input row */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      padding: 0.85rem 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); }

    /* Slug row */
    .slug-row {
      display: flex;
      align-items: stretch;
      gap: 0;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .slug-row:focus-within { border-color: var(--accent); }

    .slug-prefix {
      background: #1a1a1a;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 0.85rem 0.75rem;
      white-space: nowrap;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
    }

    .slug-row input {
      border: none;
      flex: 1;
    }
    .slug-row input:focus { border-color: transparent; }

    /* Button */
    button {
      width: 100%;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 1rem;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 1.25rem;
    }
    button:hover { background: var(--accent-dim); }
    button:active { transform: scale(0.99); }
    button:disabled { background: var(--muted); cursor: not-allowed; color: #888; }

    /* Result */
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border: 1px solid var(--border);
      background: var(--bg);
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .result.show { display: block; }
    .result.error { border-color: var(--error); }
    .result.success { border-color: var(--success); }

    .result-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .result.error .result-label { color: var(--error); }
    .result.success .result-label { color: var(--success); }

    .result-link {
      font-size: 0.9rem;
      word-break: break-all;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      white-space: nowrap;
      margin-top: 0;
      width: auto;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; }

    /* Footer */
    .footer {
      margin-top: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }

    /* Loading */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* Redirect overlay */
    .redirect-screen {
      text-align: center;
    }
    .redirect-screen .logo { margin-bottom: 2rem; }
    .redirect-message {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }
    .redirect-url {
      color: var(--accent);
      font-size: 0.75rem;
      word-break: break-all;
      margin-bottom: 2rem;
    }
    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--border);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      animation: progress 1.5s linear forwards;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    @keyframes progress { from { width: 0; } to { width: 100%; } }
  </style>
</head>
<body>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAKSjJqA-EaJ3cd2ay35luqlM9ABhhf5So",
    authDomain: "drkexternal.firebaseapp.com",
    projectId: "drkexternal",
    storageBucket: "drkexternal.firebasestorage.app",
    messagingSenderId: "489484482755",
    appId: "1:489484482755:web:1a9c297d2fd87c20cf4a76",
    measurementId: "G-0W5HFRHRFQ",
    databaseURL: "https://drkexternal-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Detect slug from path (handles GitHub Pages 404 redirect trick)
  const params = new URLSearchParams(window.location.search);
  const redirectSlug = params.get('r') || '';
  const pathSlug = window.location.pathname.replace(/^\//, '').split('/')[0];
  const slug = redirectSlug || (pathSlug && pathSlug !== 'index.html' ? pathSlug : '');

  window.addEventListener('DOMContentLoaded', () => {
    if (slug) {
      showRedirectScreen(slug);
    } else {
      showCreatorUI();
    }
  });

  function showRedirectScreen(slug) {
    document.body.innerHTML = `
      <div class="container redirect-screen" style="z-index:1;position:relative;">
        <div class="logo">drk<span>.</span>link</div>
        <p class="redirect-message">Resolving short link...</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
      </div>
    `;

    db.ref('links/' + slug).once('value').then(snap => {
      if (snap.exists()) {
        const dest = snap.val().url || snap.val();
        document.querySelector('.redirect-message').textContent = 'Redirecting you to';
        document.querySelector('.redirect-screen').insertAdjacentHTML('beforeend',
          `<p class="redirect-url">${dest}</p>`
        );
        setTimeout(() => { window.location.href = dest; }, 1500);
      } else {
        document.querySelector('.redirect-message').textContent = '404 — Short link not found.';
        document.querySelector('.redirect-message').style.color = 'var(--error)';
        document.querySelector('.progress-fill').style.background = 'var(--error)';
        setTimeout(() => { window.location.href = '/'; }, 2500);
      }
    }).catch(() => {
      document.querySelector('.redirect-message').textContent = 'Connection error. Returning home...';
    });
  }

  function showCreatorUI() {
    document.getElementById('app').style.display = 'block';
  }

  async function create() {
    const longUrl = document.getElementById('longUrl').value.trim();
    const customSlug = document.getElementById('customSlug').value.trim();
    const btn = document.getElementById('createBtn');
    const result = document.getElementById('result');

    if (!longUrl) return showResult('error', 'Please enter a URL.');
    if (!longUrl.startsWith('http://') && !longUrl.startsWith('https://')) {
      return showResult('error', 'URL must start with http:// or https://');
    }

    const finalSlug = customSlug || Math.random().toString(36).slice(2, 7);
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Shortening...';

    try {
      // Check if slug is taken
      const existing = await db.ref('links/' + finalSlug).once('value');
      if (existing.exists() && customSlug) {
        showResult('error', `"/${customSlug}" is already taken. Try another.`);
        btn.disabled = false;
        btn.textContent = 'Shorten URL';
        return;
      }

      await db.ref('links/' + finalSlug).set({
        url: longUrl,
        created: Date.now()
      });

      const shortLink = window.location.origin + '/?r=' + finalSlug;
      showResult('success', shortLink);
      document.getElementById('longUrl').value = '';
      document.getElementById('customSlug').value = '';
    } catch (e) {
      showResult('error', 'Firebase error: ' + e.message);
    }

    btn.disabled = false;
    btn.textContent = 'Shorten URL';
  }

  function showResult(type, message) {
    const result = document.getElementById('result');
    result.className = 'result show ' + type;

    if (type === 'success') {
      result.innerHTML = `
        <div class="result-label">Your short link</div>
        <div class="result-link">
          <span>${message}</span>
          <button class="copy-btn" onclick="copyLink('${message}')">Copy</button>
        </div>
      `;
    } else {
      result.innerHTML = `
        <div class="result-label">Error</div>
        <div>${message}</div>
      `;
    }
  }

  function copyLink(link) {
    navigator.clipboard.writeText(link).then(() => {
      const btn = document.querySelector('.copy-btn');
      if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 2000); }
    });
  }
</script>

<!-- Creator UI -->
<div class="container" id="app" style="display:none;">
  <div class="logo">drk<span>.</span>link</div>
  <p class="tagline">Minimal URL shortener</p>

  <div class="card">
    <div class="input-group">
      <label for="longUrl">Destination URL</label>
      <input
        type="url"
        id="longUrl"
        placeholder="https://your-very-long-url.com/goes/here"
        onkeydown="if(event.key==='Enter') create()"
      />
    </div>

    <div class="input-group">
      <label for="customSlug">Custom slug (optional)</label>
      <div class="slug-row">
        <span class="slug-prefix" id="origin-prefix">…/?r=</span>
        <input
          type="text"
          id="customSlug"
          placeholder="my-link"
          onkeydown="if(event.key==='Enter') create()"
        />
      </div>
    </div>

    <button id="createBtn" onclick="create()">Shorten URL</button>

    <div class="result" id="result"></div>
  </div>

  <p class="footer">Powered by Firebase + GitHub Pages</p>
</div>

<script>
  // Set origin prefix dynamically
  document.getElementById('origin-prefix').textContent = window.location.origin + '/?r=';
</script>

</body>
</html>
