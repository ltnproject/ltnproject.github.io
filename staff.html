<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff | D4rkzB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="container header">
        <a href="home.html" class="logo">D4rkzB</a>
        <nav>
            <a href="home.html">Home</a>
            <a href="doc.html">Docs</a>
            <a href="download.html">Download</a>
            <a href="staff.html" class="active">Staff</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <main class="container">
        <!-- Staff Login Section -->
        <div id="staff-login" class="hidden" style="display: flex; flex-direction: column; align-items: center; text-align: center; padding-top: 4rem;">
            <div class="glass card" style="width: 100%; max-width: 400px;">
                <i data-lucide="shield-lock" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 1rem;"></i>
                <h2 style="margin-bottom: 1.5rem;">Staff Access Only</h2>
                <form id="staff-form">
                    <input type="email" id="staff-email" placeholder="Staff Email" required>
                    <input type="password" id="staff-password" placeholder="Password" required>
                    <button type="submit" class="btn-primary" style="width: 100%;">
                        <i data-lucide="log-in" style="width: 20px; height: 20px;"></i> Sign In as Staff
                    </button>
                </form>
                <p id="staff-error" style="color: #ff4444; font-size: 0.9rem; margin-top: 1rem;"></p>
            </div>
        </div>

        <!-- Unauthorized Section -->
        <div id="staff-unauthorized" class="hidden" style="text-align: center; padding-top: 4rem;">
            <div class="glass card" style="display: inline-block; padding: 4rem;">
                <i data-lucide="alert-triangle" style="width: 48px; height: 48px; color: #ffbb33; margin-bottom: 1rem;"></i>
                <h2>Access Denied</h2>
                <p style="color: var(--text-muted); margin-top: 1rem;">Only authorized D4rkzB staff can view this page.</p>
                <button class="btn-primary" onclick="D4rkzB.signOut()" style="margin-top: 2rem;">Sign Out</button>
            </div>
        </div>

        <!-- Staff Dashboard Section -->
        <div id="staff-dashboard" class="hidden">
            <div style="margin-bottom: 3rem;">
                <h1 style="display: flex; align-items: center; gap: 1rem;">
                    <i data-lucide="shield-check" style="color: var(--primary); width: 32px; height: 32px;"></i> Admin Dashboard
                </h1>
                <p style="color: var(--text-muted);">Internal statistics and platform health.</p>
            </div>

            <div class="grid">
                <div class="glass card" style="text-align: center;">
                    <i data-lucide="users" style="width: 32px; height: 32px; color: var(--primary); margin-bottom: 1rem;"></i>
                    <h3 style="color: var(--text-muted); margin-bottom: 0.5rem;">Total Users</h3>
                    <p id="total-users" style="font-size: 2.5rem; font-weight: 800;">...</p>
                </div>

                <div class="glass card" style="text-align: center;">
                    <i data-lucide="activity" style="width: 32px; height: 32px; color: var(--primary); margin-bottom: 1rem;"></i>
                    <h3 style="color: var(--text-muted); margin-bottom: 0.5rem;">Active Keys</h3>
                    <p id="total-keys" style="font-size: 2.5rem; font-weight: 800;">...</p>
                </div>
            </div>

            <div class="glass card" style="margin-top: 2rem; padding: 3rem; text-align: center;">
                <p style="color: var(--text-muted);">Admin settings for <b>d4rkz@d4rkz.qzz.io</b></p>
                <button class="btn-primary" onclick="D4rkzB.signOut()" style="margin-top: 1rem; background: transparent; border: 1px solid var(--primary);">Switch Account</button>
            </div>
        </div>
    </main>

    <footer class="container">&copy; 2026 D4rkzB | Database for Everyone</footer>

    <script src="app.js"></script>
    <script>
        const STAFF_EMAIL = 'd4rkz@d4rkz.qzz.io';

        async function initStaff() {
            const user = await D4rkzB.checkUser();
            
            if (!user) {
                // Not logged in
                document.getElementById('staff-login').classList.remove('hidden');
                initLoginForm();
            } else if (user.email !== STAFF_EMAIL) {
                // Logged in but not staff
                document.getElementById('staff-unauthorized').classList.remove('hidden');
            } else {
                // Logged in as staff
                document.getElementById('staff-dashboard').classList.remove('hidden');
                loadStats();
            }
            lucide.createIcons();
        }

        function initLoginForm() {
            const form = document.getElementById('staff-form');
            form.onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('staff-email').value;
                const password = document.getElementById('staff-password').value;
                const errorEl = document.getElementById('staff-error');
                
                errorEl.innerText = '';
                try {
                    const { error } = await D4rkzB.client.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.reload();
                } catch (err) {
                    errorEl.innerText = err.message;
                }
            };
        }

        async function loadStats() {
            const { data, error } = await D4rkzB.client.from('user_keys').select('user_id');
            if (!error && data) {
                const uniqueUsers = new Set(data.map(d => d.user_id)).size;
                document.getElementById('total-users').innerText = uniqueUsers;
                document.getElementById('total-keys').innerText = data.length;
            } else {
                document.getElementById('total-users').innerText = '0';
                document.getElementById('total-keys').innerText = '0';
            }
        }

        initStaff();
    </script>
</body>
</html>
