// ══════════════════════════════════════════════════════
//  ③ RETRY HELPER — exponential backoff
// ══════════════════════════════════════════════════════
async function withRetry(fn, retries = 3, delay = 500) {
  for (let i = 0; i < retries; i++) {
    try { return await fn(); }
    catch (err) {
      if (i === retries - 1) throw err;
      await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
    }
  }
}

// ══════════════════════════════════════════════════════
//  ④ SERVER-SIDE RATE LIMIT (Firebase node per user/session)
// ══════════════════════════════════════════════════════
function getRateLimitKey() {
  // For auth'd users use UID; for guests use a session ID stored in sessionStorage
  if (currentUser) return 'u_' + currentUser.uid;
  let sid = sessionStorage.getItem('_sid');
  if (!sid) { sid = Math.random().toString(36).slice(2); sessionStorage.setItem('_sid', sid); }
  return 'g_' + sid;
}

async function checkServerRateLimit() {
  const key = getRateLimitKey();
  const ref = db.ref('ratelimit/' + key);
  const now = Date.now();
  let blocked = false;
  let waitMin = 0;

  await ref.transaction(data => {
    if (!data) return { count: 0, since: now };
    if (now - data.since > CFG.RATE_WINDOW_MS) return { count: 0, since: now };
    if (data.count >= CFG.RATE_MAX) {
      blocked = true;
      waitMin = Math.ceil((CFG.RATE_WINDOW_MS - (now - data.since)) / 60000);
      return; // abort transaction
    }
    return { ...data, count: data.count + 1 };
  });

  if (blocked) throw new Error(`Rate limit: try again in ~${waitMin} min.`);
}

    'error-callback': () => { _captchaToken = null; },
    'timeout-callback': () => { _captchaToken = null; },
  });
}

function resetCaptcha() {

function handleAuthChange(user) {

// ══════════════════════════════════════════════════════

function validateUrl(url) {
  if (!url.startsWith('https://')) return 'Only HTTPS URLs are allowed.';
  let p; try { p = new URL(url); } catch { return 'Invalid URL format.'; }
  const h = p.hostname.toLowerCase();
  if (!h.includes('.') || h === 'localhost' || /^\d+\.\d+\.\d+\.\d+$/.test(h)) return 'Invalid domain.';
  for (const b of BLOCKED_DOMAINS) if (h === b || h.endsWith('.' + b)) return `Domain "${h}" is blocked.`;
  for (const pat of BLOCKED_PATTERNS) if (pat.test(h)) return `Domain "${h}" matches a blocked pattern.`;
  if (url.length > 2000) return 'URL too long.';
  return null;
}

function genSlug(n = 8) {
  const c = 'abcdefghijkmnpqrstuvwxyz23456789';
  return Array.from({ length: n }, () => c[Math.floor(Math.random() * c.length)]).join('');
}
function cleanSlug(s) { return s.toLowerCase().replace(/[^a-z0-9\-_]/g, '').slice(0, 32); }

// Simple non-crypto hash for URL dedup
function hashUrl(url) {
  let h = 0;
  for (let i = 0; i < url.length; i++) { h = Math.imul(31, h) + url.charCodeAt(i) | 0; }
  return Math.abs(h).toString(36);
}

// ══════════════════════════════════════════════════════
//  ⑨ CREATE LINK
// ══════════════════════════════════════════════════════
async function create() {
  const longUrl  = document.getElementById('longUrl').value.trim();
  const rawSlug  = document.getElementById('customSlug').value.trim();
  const expiry   = document.getElementById('expiry').value;
  const btn      = document.getElementById('createBtn');

  // CAPTCHA check
  if (CFG.TURNSTILE_SITEKEY) {
    if (!_captchaToken) return showResult('error', 'Please complete the CAPTCHA.');
  }

  const urlErr = validateUrl(longUrl);
  if (urlErr) { resetCaptcha(); return showResult('error', urlErr); }

  const customSlug = cleanSlug(rawSlug);
  if (rawSlug && customSlug !== rawSlug) { resetCaptcha(); return showResult('error', 'Slug: letters, numbers, hyphens, underscores only.'); }
  if (customSlug && RESERVED_SLUGS.has(customSlug)) { resetCaptcha(); return showResult('error', `"${customSlug}" is a reserved word.`); }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Shortening...';

  try {
    // Server-side rate limit check (writes to Firebase ratelimit node)
    await withRetry(() => checkServerRateLimit());

    // Per-user quota check
    if (currentUser) {
      const countSnap = await withRetry(() => db.ref(`users/${currentUser.uid}/links`).once('value'));
      if (countSnap.numChildren() >= CFG.MAX_LINKS_PER_USER) {
        throw new Error(`You've reached the ${CFG.MAX_LINKS_PER_USER}-link limit. Delete some links to continue.`);
      }

      // Duplicate URL check — same URL already shortened by this user?
      const urlHash = hashUrl(longUrl);
      const dupSnap = await withRetry(() => db.ref(`users/${currentUser.uid}/hashes/${urlHash}`).once('value'));
      if (dupSnap.exists()) {
        const existingSlug = dupSnap.val();
        const existingLink = window.location.origin + '/?r=' + existingSlug;
        btn.disabled = false; btn.textContent = 'Shorten URL';
        showResult('success', existingLink, existingSlug, null);
        document.getElementById('result').insertAdjacentHTML('beforeend',
          `<div class="dup-notice">⚡ You already shortened this URL — reusing existing link.</div>`);
        resetCaptcha();
        return;
      }
    }

    // Find/validate slug
    let finalSlug = customSlug;
    if (finalSlug) {
      if (RESERVED_SLUGS.has(finalSlug)) throw new Error(`"${finalSlug}" is reserved.`);
      const ex = await withRetry(() => db.ref('links/' + finalSlug).once('value'));
      if (ex.exists()) throw new Error(`"/${finalSlug}" is already taken.`);
    } else {
      for (let i = 0; i < 8; i++) {
        const c = genSlug(8);
        if (RESERVED_SLUGS.has(c)) continue;
        const ex = await withRetry(() => db.ref('links/' + c).once('value'));
        if (!ex.exists()) { finalSlug = c; break; }
      }
      if (!finalSlug) throw new Error('Could not generate unique slug. Try again.');
    }

    const expiryMap = { '1h': 36e5, '24h': 864e5, '7d': 6048e5, '30d': 2592e6 };
    const expiresAt = expiry === 'never' ? null : Date.now() + (expiryMap[expiry] || 0);

    const payload = {
      url: longUrl, created: Date.now(), clicks: 0,
      ...(expiresAt && { expiresAt }),
      ...(currentUser && { uid: currentUser.uid }),
    };

    await withRetry(() => db.ref('links/' + finalSlug).set(payload));

    if (currentUser) {
      const urlHash = hashUrl(longUrl);
      await withRetry(() => Promise.all([
        db.ref(`users/${currentUser.uid}/links/${finalSlug}`).set({
          url: longUrl, created: Date.now(), clicks: 0, ...(expiresAt && { expiresAt })
        }),
        db.ref(`users/${currentUser.uid}/hashes/${urlHash}`).set(finalSlug),
      ]));
      loadUserLinks(currentUser.uid, 1);
    }

    const shortLink = window.location.origin + '/?r=' + finalSlug;
    showResult('success', shortLink, finalSlug, expiresAt);
    document.getElementById('longUrl').value = '';
    document.getElementById('customSlug').value = '';
    resetCaptcha();
  } catch (e) {
    showResult('error', e.message);
    resetCaptcha();
  }

  btn.disabled = false; btn.textContent = 'Shorten URL';
}

// ══════════════════════════════════════════════════════
//  ⑩ RESULT
// ══════════════════════════════════════════════════════
function showResult(type, msg, slug, expiresAt) {
  const r = document.getElementById('result');
  r.className = 'result show ' + type;
  if (type === 'success') {
    r.dataset.link = msg;
    r.innerHTML = `
      <div class="result-label">Your short link</div>
      <div class="result-link">
        <span>${esc(msg)}</span>
        <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy</button>
      </div>
      <div class="result-meta">
        <div class="meta-item">Clicks <span>0</span></div>
        <div class="meta-item">Slug <span>/${esc(slug)}</span></div>
        <div class="meta-item">Expires <span>${expiresAt ? new Date(expiresAt).toLocaleDateString() : 'Never'}</span></div>
      </div>`;
  } else {
    r.innerHTML = `<div class="result-label">Error</div><div style="font-size:.8rem;margin-top:.25rem">${esc(msg)}</div>`;
  }
}

// ══════════════════════════════════════════════════════
//  ⑪ DASHBOARD — paginated, real-time
// ══════════════════════════════════════════════════════
let _allLinks = [];
let _currentPage = 1;

let _linksListenerRef = null;

function loadUserLinks(uid, page = 1) {
  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';
  document.getElementById('linkList').innerHTML = '<div class="dash-empty"><span class="spinner-muted"></span></div>';

  // ⑤ Detach previous listener to prevent stacking on login/logout cycles
  if (_linksListenerRef) {
    _linksListenerRef.off('value');
    _linksListenerRef = null;
  }

  _linksListenerRef = db.ref(`users/${uid}/links`).orderByChild('created');
  _linksListenerRef.on('value', snap => {
    _allLinks = [];
    snap.forEach(child => _allLinks.unshift({ slug: child.key, ...child.val() }));
    _currentPage = page;
    renderDashboard(uid);
  });
}

function renderDashboard(uid) {
  const total = _allLinks.length;
  const usedPct = Math.round((total / CFG.MAX_LINKS_PER_USER) * 100);
  const fillClass = usedPct >= 90 ? 'danger' : usedPct >= 70 ? 'warn' : '';

  document.getElementById('dashMeta').innerHTML = `
    ${total} / ${CFG.MAX_LINKS_PER_USER} links
    <span class="quota-bar"><span class="quota-fill ${fillClass}" style="width:${usedPct}%"></span></span>`;

  const totalPages = Math.max(1, Math.ceil(total / CFG.PAGE_SIZE));
  if (_currentPage > totalPages) _currentPage = totalPages;

  const start = (_currentPage - 1) * CFG.PAGE_SIZE;
  const pageItems = _allLinks.slice(start, start + CFG.PAGE_SIZE);

  const list = document.getElementById('linkList');
  if (!_allLinks.length) {
    list.innerHTML = '<div class="dash-empty">No links yet. Create your first one above!</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  // Auto-delete expired links from user's view
  const now = Date.now();
  pageItems.forEach(item => {
    if (item.expiresAt && now > item.expiresAt) {
      db.ref(`users/${uid}/links/${item.slug}`).remove().catch(() => {});
    }
  });

  list.innerHTML = pageItems
    .filter(item => !item.expiresAt || now <= item.expiresAt)
    .map(item => `
      <div class="link-item" id="item-${esc(item.slug)}">
        <div class="link-item-info">
          <div class="link-item-short">${window.location.origin}/?r=${esc(item.slug)}</div>
          <div class="link-item-dest" title="${esc(item.url)}">${esc(item.url)}</div>
          <div class="link-item-meta">
            <span>${item.clicks || 0}</span> clicks ·
            ${item.expiresAt ? 'Expires ' + new Date(item.expiresAt).toLocaleDateString() : 'No expiry'}
          </div>
        </div>
        <div class="link-actions">
          <button class="action-btn" onclick="copyDirect('${esc(window.location.origin + '/?r=' + item.slug)}', this)">Copy</button>
          <button class="action-btn del" onclick="deleteLink('${esc(item.slug)}', '${esc(item.url)}')">Del</button>
        </div>
      </div>`).join('');

  // Pagination controls
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let btns = '';
  for (let i = 1; i <= totalPages; i++) {
    btns += `<button class="page-btn${i === _currentPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  pg.innerHTML = `
    <button class="page-btn" onclick="goPage(${_currentPage - 1})" ${_currentPage === 1 ? 'disabled' : ''}>←</button>
    ${btns}
    <button class="page-btn" onclick="goPage(${_currentPage + 1})" ${_currentPage === totalPages ? 'disabled' : ''}>→</button>`;
}

function goPage(p) {
  _currentPage = p;
  if (currentUser) renderDashboard(currentUser.uid);
}

// ══════════════════════════════════════════════════════
//  ⑫ DELETE with undo toast + retry
// ══════════════════════════════════════════════════════
let _undoTimer = null;
let _pendingDelete = null;

async function deleteLink(slug, url) {
  if (!currentUser) return;

  // Optimistic UI: mark as deleting immediately
  const el = document.getElementById('item-' + slug);
  if (el) el.classList.add('deleting');

  // Cancel any previous pending delete first
  if (_pendingDelete) {
    await commitDelete(_pendingDelete.slug, _pendingDelete.url, _pendingDelete.uid);
  }

  _pendingDelete = { slug, url, uid: currentUser.uid };

  // Show undo toast
  showUndoToast(slug, () => {
    // Undo: restore element
    const el2 = document.getElementById('item-' + slug);
    if (el2) el2.classList.remove('deleting');
    _pendingDelete = null;
  });
}

async function commitDelete(slug, url, uid) {
  try {
    const urlHash = hashUrl(url);
    await withRetry(() => Promise.all([
      db.ref('links/' + slug).remove(),
      db.ref(`users/${uid}/links/${slug}`).remove(),
      db.ref(`users/${uid}/hashes/${urlHash}`).remove(),
    ]));
  } catch (e) {
    // Restore on failure
    const el = document.getElementById('item-' + slug);
    if (el) { el.classList.remove('deleting'); showToast('Delete failed. Try again.'); }
  }
}

function showUndoToast(slug, onUndo) {
  // Remove existing toast
  document.querySelectorAll('.undo-toast').forEach(t => t.remove());
  clearTimeout(_undoTimer);

  const toast = document.createElement('div');
  toast.className = 'undo-toast';
  toast.innerHTML = `Link deleted <button class="undo-btn" id="undoBtnToast">Undo</button>`;
  document.body.appendChild(toast);

  document.getElementById('undoBtnToast').onclick = () => {
    clearTimeout(_undoTimer);
    toast.remove();
    onUndo();
    _pendingDelete = null;
  };

  _undoTimer = setTimeout(async () => {
    toast.remove();
    if (_pendingDelete && _pendingDelete.slug === slug) {
      await commitDelete(_pendingDelete.slug, _pendingDelete.url, _pendingDelete.uid);
      _pendingDelete = null;
    }
  }, 5000);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'undo-toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ══════════════════════════════════════════════════════
//  ⑬ COPY
// ══════════════════════════════════════════════════════
function copyLink() {
  const link = document.getElementById('result').dataset.link; if (!link) return;
  navigator.clipboard.writeText(link).then(() => {
    const b = document.getElementById('copyBtn'); if (b) { b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy', 2000); }
  }).catch(() => {
    const ta = document.createElement('textarea'); ta.value = link; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    const b = document.getElementById('copyBtn'); if (b) { b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy', 2000); }
  });
}

function copyDirect(link, btn) {
  navigator.clipboard.writeText(link).then(() => { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 2000); });
}

// ══════════════════════════════════════════════════════
//  ⑭ REDIRECT SCREEN — shows domain only, not full URL
// ══════════════════════════════════════════════════════
let _dest = null;
function showRedirectScreen(slug) {
  document.body.innerHTML = `
    <div class="container redirect-screen" style="z-index:1;position:relative;">
      <div class="logo">drk<span>.</span>link</div>
      <p class="redirect-message">Resolving link...</p>
      <div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>
      <button class="skip-btn" id="skipBtn" style="display:none" onclick="window.location.href=_dest">Skip →</button>
    </div>`;

  db.ref('links/' + slug).once('value').then(snap => {
    if (!snap.exists()) {
      document.querySelector('.redirect-message').textContent = '404 — Link not found.';
      document.querySelector('.redirect-message').style.color = 'var(--error)';
      document.getElementById('pbar').style.background = 'var(--error)';
      setTimeout(() => window.location.href = '/', 2500); return;
    }
    const data = snap.val();
    if (data.expiresAt && Date.now() > data.expiresAt) {
      // ④ Clean up BOTH nodes when expired
      Promise.all([
        db.ref('links/' + slug).remove(),
        data.uid ? db.ref(`users/${data.uid}/links/${slug}`).remove() : Promise.resolve(),
        data.uid ? db.ref(`users/${data.uid}/hashes/${hashUrl(data.url||'')}`).remove() : Promise.resolve(),
      ]).catch(() => {});
      document.querySelector('.redirect-message').textContent = 'This link has expired.';
      document.querySelector('.redirect-message').style.color = 'var(--warn)';
      setTimeout(() => window.location.href = '/', 2500); return;
    }

    _dest = data.url;
    let domain = '';
    try { domain = new URL(_dest).hostname; } catch { domain = _dest; }

    // ── Click tracking — best-effort without a backend ──────────────────
    // Layer 1: sessionStorage  → one count per browser tab session per slug
    // Layer 2: localStorage    → one count per 24 hrs per slug per device
    // Layer 3: Firebase rule   → write only allowed if newVal === oldVal + 1
    // What this stops: accidental double-counts, casual abuse, page refreshes
    // What this doesn't stop: determined attacker with DevTools (needs backend)
    const sessKey = 'ck_s_' + slug;
    const lsKey   = 'ck_l_' + slug;
    const lsData  = (() => { try { return JSON.parse(localStorage.getItem(lsKey)||'{}'); } catch { return {}; } })();
    const alreadyThisSession = sessionStorage.getItem(sessKey);
    const alreadyToday = lsData.t && (Date.now() - lsData.t) < 86400000;

    if (!alreadyThisSession && !alreadyToday) {
      sessionStorage.setItem(sessKey, '1');
      localStorage.setItem(lsKey, JSON.stringify({ t: Date.now() }));
      db.ref('links/' + slug + '/clicks').transaction(c => (c || 0) + 1);
      if (data.uid) db.ref(`users/${data.uid}/links/${slug}/clicks`).transaction(c => (c || 0) + 1);
    }

    document.querySelector('.redirect-message').textContent = 'You are being redirected to:';
    document.querySelector('.redirect-screen').insertAdjacentHTML('beforeend', `
      <div class="warn-badge">⚠ verify before proceeding</div>
      <div class="redirect-domain">${esc(domain)}</div>
      <div class="redirect-sub">via drk.link short URL</div>
    `);
    document.getElementById('skipBtn').style.display = 'inline-block';
    setTimeout(() => window.location.href = _dest, 2000);
  }).catch(() => {
    document.querySelector('.redirect-message').textContent = 'Connection error. Retrying...';
    // Retry once after 2 seconds
    setTimeout(() => window.location.reload(), 2000);
  });
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// hashUrl is defined earlier but referenced here too — safe since JS hoists functions
</script>
