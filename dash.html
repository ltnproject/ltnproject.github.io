<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dashboard — LtM Meeting</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body id="dash-root">

  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">LtM Meeting</span>
    </div>
    <div class="nav-user">
      <div id="nav-user"></div>
      <span id="nav-username" class="nav-username"></span>
    </div>
  </nav>

  <!-- Dashboard layout -->
  <div class="dash-layout">

    <!-- Welcome card -->
    <div class="dash-welcome glass-card">
      <div id="dash-avatar"></div>
      <div class="dash-greeting">
        <div class="dash-greeting-label">Welcome back</div>
        <div class="dash-greeting-name" id="dash-name">Loading...</div>
      </div>
      <button class="dash-sign-out" id="sign-out-btn">Sign out</button>
    </div>

    <!-- Main grid -->
    <div class="dash-grid">

      <!-- Create meeting panel -->
      <div class="dash-panel">
        <div>
          <div class="panel-title">New Meeting</div>
          <p style="font-size:14px;color:var(--text-muted);margin-top:6px">
            Generate an instant room with a shareable link.
          </p>
        </div>

        <!-- Passcode toggle -->
        <label class="passcode-toggle">
          <div class="toggle-switch" id="passcode-toggle"></div>
          Add passcode protection
        </label>

        <!-- Passcode input (hidden by default) -->
        <div id="passcode-field" class="hidden">
          <div class="panel-label">Passcode</div>
          <input
            class="input-field input-mono"
            id="passcode-input"
            type="text"
            placeholder="e.g. 9317"
            maxlength="12"
            autocomplete="off"
          >
        </div>

        <!-- Create button -->
        <button class="panel-create-btn" id="create-btn">
          ＋ Start New Meeting
        </button>
      </div>

      <!-- Join meeting panel -->
      <div class="dash-panel">
        <div>
          <div class="panel-title">Join a Meeting</div>
          <p style="font-size:14px;color:var(--text-muted);margin-top:6px">
            Enter an 8-digit Meeting ID to join an existing room.
          </p>
        </div>

        <div>
          <div class="panel-label">Meeting ID</div>
          <input
            class="input-field input-mono"
            id="join-id-input"
            type="text"
            placeholder="12345678"
            maxlength="8"
            inputmode="numeric"
            autocomplete="off"
          >
        </div>

        <div>
          <div class="panel-label">Passcode (if required)</div>
          <input
            class="input-field"
            id="join-passcode-input"
            type="text"
            placeholder="Leave blank if none"
            maxlength="12"
            autocomplete="off"
          >
        </div>

        <button class="btn btn-primary" style="width:100%;justify-content:center" id="join-btn">
          Join →
        </button>
      </div>
    </div>

    <!-- Recent meetings -->
    <div class="dash-panel" style="gap:16px">
      <div class="panel-title">Recent Meetings</div>
      <div class="recent-meetings" id="recent-list">
        <p style="font-size:13px;color:var(--text-muted);text-align:center;padding:16px 0">
          <span class="spinner"></span> Loading...
        </p>
      </div>
    </div>

  </div>

  <!-- Create Meeting Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal-box">
      <div class="modal-title">🎉 Meeting Created</div>
      <div class="modal-sub">Share this ID with your participants</div>

      <div class="modal-id-display" id="modal-meeting-id">—</div>

      <!-- Hidden input to hold the link for copying -->
      <input type="hidden" id="modal-meeting-link">

      <button class="copy-link-btn" id="copy-link-btn">
        🔗 Copy Meeting Link
      </button>

      <div style="display:flex;gap:10px;margin-top:16px">
        <button
          class="btn btn-ghost"
          style="flex:1;justify-content:center"
          data-close-modal="create-modal"
        >
          Close
        </button>
        <button
          class="btn btn-primary"
          style="flex:1;justify-content:center"
          id="modal-enter-btn"
        >
          Enter Meeting →
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Update nav username after auth
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        const el = document.getElementById('nav-username');
        if (el) el.textContent = user.displayName?.split(' ')[0] || '';
      }
    });
  </script>
</body>
</html>
